       align-self:flex-start fixes a SEPARATE problem from the same root
       cause: #red-ui-header has align-items:center, and #red-ui-header-tabs
       itself has almost no intrinsic height (its real child, the native
       tab <ul>, is display:none - our #nr-grouped-flows is position:absolute
       and contributes nothing to its parent's own height either). With
       align-items:center, that near-zero-height box was being vertically
       CENTERED inside the now-taller header instead of pinned to its top -
       so our whole two-row (or one-row) tab stack, anchored to it, floated
       in the middle of the header with dead space above and below, instead
       of sitting flush at the top like the native tab bar does. */
    #red-ui-header-tabs.nr-grouped-flows-enabled {
        position: relative;
        align-self: flex-start;
    }

    /* NR4: tab bar lives inside #red-ui-workspace.
       NR5: tab bar (and -shade) moved to #red-ui-header-tabs, a sibling of
       #red-ui-workspace. We match both so one file works on either version;
       whichever selector doesn't exist in the current DOM simply never matches. */
    #red-ui-workspace.nr-grouped-flows-enabled #nr-grouped-flows,
    #red-ui-header-tabs.nr-grouped-flows-enabled #nr-grouped-flows {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 3;
        display: flex;
        flex-direction: column;
    }

    #nr-grouped-flows > .red-ui-tabs {
        margin-bottom: 0;
    }

    #nr-grouped-flows > .red-ui-tabs + .red-ui-tabs {
        margin-top: 2px;
    }

    /* NR5 only. .nr-grouped-flows-row-flows is added in JS to the FLOWS
       row's own wrapper (not the GROUPS row above it). Without this, the
       row's wrapper stretches to the full #nr-grouped-flows width by
       default (align-items:stretch is the flex-column default) - correct
       and desired for the GROUPS row (it's meant to look like a full-width
       bar, matching the native single-row tab bar), but wrong here: when
       the active group has few flows, the empty space to the right of the
       last flow tab still carries the row's own opaque background
       (core NR5 style, --red-ui-header-background) and, being inside a
       position:absolute container, that empty painted rectangle lands
       directly on top of the canvas below instead of just... not being
       there. align-self:flex-start makes this ONE row hug its actual
       tabs instead of stretching to match the groups row's width. */
    #nr-grouped-flows > .red-ui-tabs.nr-grouped-flows-row-flows {
        align-self: flex-start;
    }

    /* CSS custom properties do not cross sibling boundaries, only inherit
       down the DOM tree - so this must be declared on BOTH possible hosts,
       not just #red-ui-workspace, otherwise #red-ui-header-tabs's subtree
       (the shade, on NR5) would see the vars as unset. */
    #red-ui-workspace.nr-grouped-flows-enabled,
    #red-ui-header-tabs.nr-grouped-flows-enabled {
        --nr-grouped-flows-tab-height-dual: 72px;
        --nr-grouped-flows-tab-height-single: 36px;
    }

    /* NR4 only. On NR4 the tab bar lives inside #red-ui-workspace itself,
       so the chart needs its own internal top-offset to make room for it.
       On NR5 (marked via .nr-grouped-flows-header-mode, set in JS once
       headerTabsMode is detected) the tab bar lives in the header instead,
       and #red-ui-workspace already starts lower because we grew
       --red-ui-header-height at the #red-ui-editor level - applying this
       offset there too would double-count and leave a dead gap at the
       top of the canvas, so it's explicitly excluded. */
    #red-ui-workspace.nr-grouped-flows-enabled:not(.nr-grouped-flows-header-mode) #red-ui-workspace-chart {
        top: var(--nr-grouped-flows-tab-height-dual);
    }

    #red-ui-workspace.nr-grouped-flows-enabled #red-ui-workspace-tabs-shade,
    #red-ui-header-tabs.nr-grouped-flows-enabled #red-ui-workspace-tabs-shade {
        height: var(--nr-grouped-flows-tab-height-dual);
    }

    #red-ui-workspace.nr-grouped-flows-enabled:not(.nr-grouped-flows-header-mode).nr-grouped-flows-single-row #red-ui-workspace-chart {
        top: var(--nr-grouped-flows-tab-height-single);
    }

    #red-ui-workspace.nr-grouped-flows-enabled.nr-grouped-flows-single-row #red-ui-workspace-tabs-shade,
    #red-ui-header-tabs.nr-grouped-flows-enabled.nr-grouped-flows-single-row #red-ui-workspace-tabs-shade {
        height: var(--nr-grouped-flows-tab-height-single);
    }

    /* NR5 only (class is only ever added to #red-ui-editor when JS detects
       headerTabsMode - on NR4 this rule simply never matches anything).
       #red-ui-header and #red-ui-main-container are both absolutely
       positioned children of #red-ui-editor, and both read the SAME
       --red-ui-header-height custom property: the header uses it as its
       own height, main-container uses it as its top offset. Our second
       tab row lives inside #red-ui-header and doesn't fit in the native
       40px box, so it was spilling out onto the Palette/Workspace/Sidebar
       row below. Growing the shared variable here grows the header AND
       pushes everything below it down, in one consistent move - no need
       to touch #red-ui-main-container, Palette, or sidebar CSS directly.

       IMPORTANT: this must NOT be written as
           --red-ui-header-height: calc(var(--red-ui-header-height) + 36px);
       on this same selector. Per the CSS custom properties spec, a
       property's dependency graph allows "edges from a custom property to
       itself" - referencing --red-ui-header-height while ALSO redefining
       --red-ui-header-height on the very same element is a genuine cycle,
       not "read the inherited value first". A cycle makes the property
       invalid at computed-value time; #red-ui-header's `height: var(...)`
       then falls back to `auto`, and the header's real rendered height
       becomes whatever the browser's flex auto-sizing happens to produce -
       which is how a 36px tweak turned into the header eating the whole
       viewport. Using separate, non-conflicting variable names below
       avoids the cycle entirely. Override these two if 76px/40px don't
       match your actual tab row heights pixel-for-pixel. */
    #red-ui-editor {
        --nr-grouped-flows-header-height-dual: 76px;
        --nr-grouped-flows-header-height-single: 40px;
    }
    #red-ui-editor.nr-grouped-flows-enabled {
        --red-ui-header-height: var(--nr-grouped-flows-header-height-dual);
    }

    /* Single-row mode: only the group row is shown, so the native NR5
       header height already fits it. This selector is more specific than
       the one above, so it wins the cascade whenever both classes are present. */
    #red-ui-editor.nr-grouped-flows-enabled.nr-grouped-flows-single-row {
        --red-ui-header-height: var(--nr-grouped-flows-header-height-single);
    }


    /* subflow tab close button */
    #nr-grouped-flows li.red-ui-tab {
        position: relative;
    }

    #nr-grouped-flows li.red-ui-tab .nr-grouped-flows-close-btn {
        display: none;
        position: absolute;
        right: 6px;
        top: 50%;
        transform: translateY(-50%);
        width: 14px;
        height: 14px;
        line-height: 14px;
        text-align: center;
        font-size: 12px;
        cursor: pointer;
        border-radius: 3px;
        z-index: 10;
        color: inherit;
        opacity: 0.7;
    }

    #nr-grouped-flows li.red-ui-tab .nr-grouped-flows-close-btn::after {
        content: "\00d7";
    }

    #nr-grouped-flows li.red-ui-tab:hover .nr-grouped-flows-close-btn {
        display: block;
    }

    #nr-grouped-flows li.red-ui-tab .nr-grouped-flows-close-btn:hover {
        opacity: 1;
        background-color: rgba(0,0,0,0.15);
    }

    </style>
