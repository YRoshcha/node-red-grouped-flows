<script type="text/javascript">
    (function() {
        "use strict";

        const PLUGIN_ID = "nr-grouped-flows";
        const PLUGIN_VERSION = "0.4.1-nr5patch6";
        const ORIGINAL_UL_ID = "red-ui-workspace-tabs";
        const CONTAINER_ID = "nr-grouped-flows";
        const GROUPS_UL_ID = "nr-grouped-flows-groups";
        const FLOWS_UL_ID = "nr-grouped-flows-flows";
        const WORKSPACE_ROOT_ID = "red-ui-workspace";
        // NR5 moved #red-ui-workspace-tabs (and its -shade sibling) out of
        // #red-ui-workspace and into a new #red-ui-header-tabs container in
        // the redesigned header. On NR4 this element simply doesn't exist,
        // so selecting it is always a harmless no-op (empty jQuery set).
        const HEADER_TABS_ID = "red-ui-header-tabs";
        // Shared ancestor of #red-ui-header and #red-ui-main-container in NR5.
        // Both read the SAME --red-ui-header-height custom property (header
        // uses it for its own height, main-container uses it as its top
        // offset) - so bumping it here on their common parent is what
        // actually reflows the Palette/Workspace/Sidebar row downward.
        const EDITOR_ROOT_ID = "red-ui-editor";
        // Marker class added to #red-ui-workspace only when headerTabsMode
        // is true (NR5). Lets the CSS distinguish "tab bar lives inside
        // #red-ui-workspace, chart needs its own top-offset" (NR4) from
        // "tab bar lives in the header, main-container is already shifted
        // down via --red-ui-header-height, chart needs NO extra offset" (NR5).
        const HEADER_MODE_CLASS = "nr-grouped-flows-header-mode";
        const WORKSPACE_ENABLED_CLASS = "nr-grouped-flows-enabled";
        const WORKSPACE_GROUP_PROPERTY = "group";
        const WORKSPACE_SINGLE_ROW_CLASS = "nr-grouped-flows-single-row";
        const DIALOG_GROUP_ROW_CLASS = "nr-grouped-flows-group-row";
        const DIALOG_GROUP_INPUT_ID = "nr-grouped-flows-group-input";
        const DIALOG_GROUP_SAVE_NS = ".nrGroupedFlowsGroupSave";
        const BOOT_RETRY_INTERVAL_MS = 250;
        const BOOT_MAX_RETRIES = 120;
        const WARN_CORE_TABS_RETRY_AT = 40;
        const FLOW_DOUBLE_CLICK_WINDOW_MS = 450;
        const EDIT_DIALOG_DEFER_MS = 40;
        const GROUP_REORDER_SETTLE_MS = 500;
        const DEBUG_STORAGE_KEY = "nr-grouped-flows-debug";
        let pluginRegistered = false;

        function isDebugEnabled() {
            try {
                return window.localStorage && localStorage.getItem(DEBUG_STORAGE_KEY) === "1";
            } catch (err) {
                return false;
            }
        }

        function setDebugEnabled(enabled) {
            try {
                if (!window.localStorage) {
                    return;
                }
                if (enabled) {
                    localStorage.setItem(DEBUG_STORAGE_KEY, "1");
                } else {
                    localStorage.removeItem(DEBUG_STORAGE_KEY);
                }
            } catch (err) {
                // Ignore storage access failures.
            }
        }

        function t(key, fallback, options) {
            try {
                if (window.RED && typeof RED._ === "function") {
                    return RED._("nr-grouped-flows:" + key, options || {}) || fallback;
                }
            } catch (err) {
                // Ignore missing i18n keys and fall back to plain text.
            }
            return fallback;
        }

        // T015: Factory returns the canonical initial/reset shape for all controller state.
        // stop() uses Object.assign(state, createInitialState()) instead of manual field resets.
        function createInitialState() {
            return {
                originalWrapper: null,
                container: null,
                groupTabs: null,
                flowTabs: null,
                model: {
                    groups: [],
                    groupByName: {},
                    workspaceToGroup: {},
                    activeWorkspaceId: null
                },
                activeGroup: null,
                suspendGroupChange: false,
                suspendFlowChange: false,
                retryTimer: null,
                rebuildTimer: null,
                eventBindings: [],
                retryCount: 0,
                didWarnUnavailable: false,
                lastKnownActiveWorkspaceId: null,
                lastWorkspaceByGroup: {},
                groupTabGroupMap: {},
                flowTabWorkspaceMap: {},
                lastFlowPointerWorkspaceId: null,
                lastFlowPointerTime: 0,
                pendingFlowDoubleWorkspaceId: null,
                pendingEditOpenTimer: null,
                dialogFieldRetryTimer: null,
                applyingFlowReorder: false,
                applyingGroupReorder: false,
                skipNextFlowsReorderRebuild: false,
                lastRenderedGroupSignature: "",
                lastRenderedActiveGroup: null,
                lastRenderedFlowGroup: null,
                lastRenderedFlowSignature: "",
                lastRenderedActiveFlowTab: null,
                wrappedEditFlow: null,
                originalEditFlow: null,
                originalXHROpen: null,
                originalXHRSend: null,
                persistedGroups: null,
                // T020 (patch): true when the core tab bar was found living
                // inside #red-ui-header-tabs (NR5) rather than nested in
                // #red-ui-workspace (NR4). Drives whether we also need to
                // grow --red-ui-header-height on #red-ui-editor.
                headerTabsMode: false
            };
        }

        function createController() {
            const debugEnabled = isDebugEnabled();
            // T016: state initialised from factory instead of inline literal.
            const state = createInitialState();
            const adminBase = (RED.settings.httpAdminRoot || "").replace(/\/$/, "");

            // T020 (patch): NR5 compat. State classes (enabled / single-row) drive
            // CSS that positions the grouped tab bar and sizes the shade behind it.
            // Pre-NR5 that CSS only needed #red-ui-workspace, because that's where
            // the tab bar actually lived. NR5 relocated the tab bar (and shade)
            // into #red-ui-header-tabs, which is a sibling of #red-ui-workspace,
            // not a descendant - so descendant selectors scoped to #red-ui-workspace
            // stopped matching. We apply the same classes to both containers; the
            // CSS matches on whichever one is actually present.
            //
            // On NR5 there's a second, separate problem: #red-ui-header-tabs
            // sits inside #red-ui-header, which is position:absolute with a
            // fixed height (--red-ui-header-height, 40px by default). Our
            // second tab row doesn't fit in that box and spills out below it,
            // straight onto #red-ui-main-container (Palette/Workspace/Sidebar),
            // which starts immediately at top: var(--red-ui-header-height).
            // Both #red-ui-header and #red-ui-main-container read that same
            // variable from their shared parent, #red-ui-editor - so bumping
            // it there (only when we've confirmed we're in NR5 header mode)
            // grows the header AND pushes the row below down, in one move.
            function getWorkspaceStateTargets() {
                var selector = "#" + WORKSPACE_ROOT_ID + ", #" + HEADER_TABS_ID;
                if (state.headerTabsMode) {
                    selector += ", #" + EDITOR_ROOT_ID;
                }
                return $(selector);
            }

            function debug(message, data) {
                if (!debugEnabled || !window.console || typeof console.log !== "function") {
                    return;
                }
                if (typeof data !== "undefined") {
                    console.log("[nr-grouped-flows][debug] " + message, data);
                } else {
                    console.log("[nr-grouped-flows][debug] " + message);
                }
            }

            function warn(message) {
                if (window.console && typeof console.warn === "function") {
                    console.warn("[nr-grouped-flows] " + message);
                }
                if (window.RED && RED.notify && typeof RED.notify === "function") {
                    try {
                        RED.notify(message, "warning", false, 3000);
                    } catch (err) {
                        // Ignore notification failures - the console.warn above is the fallback.
                    }
                }
            }

            function addFlowEnabled() {
                if (RED.settings && typeof RED.settings.theme === "function") {
                    return RED.settings.theme("menu.menu-item-workspace-add", true);
                }
                return true;
            }

            function buildFlowMenu() {
                return [
                    {
                        id: "nr-grouped-tabs-list-flows",
                        label: t("workspace.listFlows", "List flows"),
                        onselect: "core:list-flows"
                    },
                    {
                        id: "nr-grouped-tabs-list-subflows",
                        label: t("workspace.listSubflows", "List subflows"),
                        onselect: "core:list-subflows"
                    },
                    null,
                    {
                        id: "nr-grouped-tabs-add-flow",
                        label: t("workspace.addFlow", "Add flow"),
                        onselect: "core:add-flow"
                    }
                ];
            }

            function normalizeGroupName(value) {
                return String(value || "").trim();
            }

            function htmlEscape(str) {
                return String(str || "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            function getWorkspaceById(workspaceId) {
                if (!workspaceId || !RED.nodes || typeof RED.nodes.workspace !== "function") {
                    return null;
                }
                return RED.nodes.workspace(workspaceId);
            }

            function makeStableGroupTabId(groupName) {
                const normalized = String(groupName || "");
                let slug = normalized
                    .toLowerCase()
                    .replace(/\s+/g, "-")
                    .replace(/[^a-z0-9_-]+/g, "-")
                    .replace(/-+/g, "-")
                    .replace(/^-+|-+$/g, "");
                if (!slug) {
                    slug = "group";
                }

                // Deterministic hash keeps IDs stable and avoids collisions for similar slugs.
                let hash = 2166136261;
                for (let i = 0; i < normalized.length; i += 1) {
                    hash ^= normalized.charCodeAt(i);
                    hash += (hash << 1) + (hash << 4) + (hash << 7) + (hash << 8) + (hash << 24);
                }
                const suffix = (hash >>> 0).toString(36);
                return "nr-group-tab-" + slug + "-" + suffix;
            }

            function makeStableTopFlowTabId(workspaceId) {
                return "nr-top-flow-tab-" + String(workspaceId || "");
            }

            function makeStableFlowTabId(workspaceId) {
                return "nr-flow-tab-" + String(workspaceId || "");
            }

            function getActiveWorkspaceIdFromCore() {
                if (RED.workspaces && typeof RED.workspaces.active === "function") {
                    const active = RED.workspaces.active();
                    if (typeof active === "string" && active) {
                        return active;
                    }
                    if (active && typeof active.id === "string" && active.id) {
                        return active.id;
                    }
                }

                const activeLink = $("#" + ORIGINAL_UL_ID + " li.red-ui-tab.active > a.red-ui-tab-label").first();
                if (!activeLink.length) {
                    return state.lastKnownActiveWorkspaceId;
                }
                const href = activeLink.attr("href") || "";
                if (!href || href.charAt(0) !== "#") {
                    return state.lastKnownActiveWorkspaceId;
                }
                return href.slice(1);
            }

            function readCoreTabs() {
                const items = [];
                const originalUl = $("#" + ORIGINAL_UL_ID);

                if (!originalUl.length) {
                    return items;
                }

                originalUl.children("li.red-ui-tab").each(function(index, el) {
                    const li = $(el);
                    if (li.hasClass("hide-tab") || li.hasClass("hide")) {
                        return;
                    }

                    const link = li.children("a.red-ui-tab-label[href^='#']").first();
                    if (!link.length) {
                        return;
                    }

                    const href = link.attr("href") || "";
                    if (href.charAt(0) !== "#") {
                        return;
                    }

                    const workspaceId = href.slice(1);
                    let fullLabel = link.find("span.red-ui-text-bidi-aware").first().text().trim();
                    if (!fullLabel) {
                        fullLabel = link.text().trim() || workspaceId;
                    }

                    const workspace = getWorkspaceById(workspaceId);

                    items.push({
                        workspaceId: workspaceId,
                        fullLabel: fullLabel,
                        group: normalizeGroupName(workspace ? workspace[WORKSPACE_GROUP_PROPERTY] : ""),
                        disabled: li.hasClass("red-ui-workspace-disabled"),
                        locked: li.hasClass("red-ui-workspace-locked"),
                        changed: li.hasClass("red-ui-workspace-changed"),
                        active: li.hasClass("active")
                    });
                });

                return items;
            }

            function buildModel() {
                if (!state.persistedGroups) { state.persistedGroups = {}; }
                const groups = [];
                const groupByName = {};
                const workspaceToGroup = {};
                let activeWorkspaceId = null;
                const coreTabs = readCoreTabs();
                const explicitActiveWorkspaceId = getActiveWorkspaceIdFromCore();
                const validWorkspaceIds = {};

                coreTabs.forEach(function(item) {
                    validWorkspaceIds[item.workspaceId] = true;
                    if (item.group) {
                        state.persistedGroups[item.workspaceId] = item.group;
                    }
                    const flow = {
                        workspaceId: item.workspaceId,
                        flowTabId: makeStableFlowTabId(item.workspaceId),
                        label: item.fullLabel,
                        fullLabel: item.fullLabel,
                        disabled: item.disabled,
                        locked: item.locked,
                        changed: item.changed
                    };
                    const groupName = normalizeGroupName(
                        item.group || (state.persistedGroups && state.persistedGroups[item.workspaceId]) || ""
                    );
                    let group;

                    if (groupName) {
                        const groupKey = "group:" + groupName;
                        group = groupByName[groupKey];
                        if (!group) {
                            group = {
                                key: groupKey,
                                name: groupName,
                                tabId: makeStableGroupTabId(groupName),
                                flows: [],
                                standalone: false
                            };
                            groupByName[group.key] = group;
                            groups.push(group);
                        }
                        group.flows.push(flow);
                        workspaceToGroup[flow.workspaceId] = group.key;
                    } else {
                        group = {
                            key: "flow:" + flow.workspaceId,
                            name: flow.label,
                            tabId: makeStableTopFlowTabId(flow.workspaceId),
                            flows: [flow],
                            standalone: true,
                            standaloneWorkspaceId: flow.workspaceId
                        };
                        groupByName[group.key] = group;
                        groups.push(group);
                        workspaceToGroup[flow.workspaceId] = group.key;
                    }

                    if (item.active || flow.workspaceId === explicitActiveWorkspaceId) {
                        activeWorkspaceId = item.workspaceId;
                    }
                });

                if (coreTabs.length && state.persistedGroups) {
                    Object.keys(state.persistedGroups).forEach(function(workspaceId) {
                        if (!validWorkspaceIds[workspaceId]) {
                            delete state.persistedGroups[workspaceId];
                        }
                    });
                }

                return {
                    groups: groups,
                    groupByName: groupByName,
                    workspaceToGroup: workspaceToGroup,
                    activeWorkspaceId: activeWorkspaceId || explicitActiveWorkspaceId || state.lastKnownActiveWorkspaceId
                };
            }

            function getTabId(tab) {
                if (!tab) {
                    return "";
                }
                if (typeof tab === "string") {
                    return tab;
                }
                if (typeof tab.id === "string" && tab.id) {
                    return tab.id;
                }
                if (typeof tab.tabId === "string" && tab.tabId) {
                    return tab.tabId;
                }
                if (typeof tab.href === "string" && tab.href.charAt(0) === "#") {
                    return tab.href.slice(1);
                }
                return "";
            }

            function listTabIds(tabApi, ulId) {
                const tabIds = [];
                if (tabApi && typeof tabApi.listTabs === "function") {
                    (tabApi.listTabs() || []).forEach(function(tabEntry) {
                        const tabId = getTabId(tabEntry);
                        if (tabId) {
                            tabIds.push(tabId);
                        }
                    });
                }

                if (!tabIds.length && ulId) {
                    $("#" + ulId + " a.red-ui-tab-label[href^='#']").each(function() {
                        const href = $(this).attr("href") || "";
                        if (href.charAt(0) === "#") {
                            tabIds.push(href.slice(1));
                        }
                    });
                }

                const uniqueTabIds = [];
                const seen = {};
                tabIds.forEach(function(tabId) {
                    if (!seen[tabId]) {
                        seen[tabId] = true;
                        uniqueTabIds.push(tabId);
                    }
                });
                return uniqueTabIds;
            }

            function clearTabs(tabApi, ulId) {
                if (!tabApi || typeof tabApi.removeTab !== "function") {
                    return;
                }

                listTabIds(tabApi, ulId).forEach(function(tabId) {
                    tabApi.removeTab(tabId);
                });
            }

            function arraysEqual(a, b) {
                if (!a || !b || a.length !== b.length) {
                    return false;
                }
                for (let i = 0; i < a.length; i += 1) {
                    if (a[i] !== b[i]) {
                        return false;
                    }
                }
                return true;
            }

            function getGroupSignature(groups) {
                if (!Array.isArray(groups) || !groups.length) {
                    return "";
                }
                return groups.map(function(group) {
                    return [
                        group.key || "",
                        group.name || "",
                        group.standalone ? "1" : "0"
                    ].join("");
                }).join("");
            }

            function getFlowSignature(flows) {
                if (!Array.isArray(flows) || !flows.length) {
                    return "";
                }
                return flows.map(function(flow) {
                    return [
                        flow.workspaceId,
                        flow.label || "",
                        flow.fullLabel || "",
                        flow.disabled ? "1" : "0",
                        flow.locked ? "1" : "0",
                        flow.changed ? "1" : "0"
                    ].join("");
                }).join("");
            }

            function rememberWorkspaceForGroup(workspaceId) {
                if (!workspaceId) {
                    return;
                }
                const groupKey = state.model.workspaceToGroup[workspaceId];
                if (!groupKey) {
                    return;
                }
                state.lastWorkspaceByGroup[groupKey] = workspaceId;
            }

            function pruneGroupWorkspaceMemory() {
                Object.keys(state.lastWorkspaceByGroup).forEach(function(groupKey) {
                    const rememberedWorkspaceId = state.lastWorkspaceByGroup[groupKey];
                    const group = state.model.groupByName[groupKey];
                    if (!group || !rememberedWorkspaceId) {
                        delete state.lastWorkspaceByGroup[groupKey];
                        return;
                    }
                    const existsInGroup = group.flows.some(function(flow) {
                        return flow.workspaceId === rememberedWorkspaceId;
                    });
                    if (!existsInGroup) {
                        delete state.lastWorkspaceByGroup[groupKey];
                    }
                });
            }

            function getGroupKeyForTab(tab) {
                if (tab && typeof tab.groupKey === "string" && tab.groupKey) {
                    return tab.groupKey;
                }
                let tabId = getTabId(tab);
                if (!tabId) {
                    const groupHref = $("#" + GROUPS_UL_ID + " li.red-ui-tab.active a.red-ui-tab-label").first().attr("href") || "";
                    if (groupHref.charAt(0) === "#") {
                        tabId = groupHref.slice(1);
                    }
                }
                if (tabId && state.groupTabGroupMap[tabId]) {
                    return state.groupTabGroupMap[tabId];
                }
                return "";
            }

            function getWorkspaceIdForFlowTab(tab) {
                if (tab && typeof tab.workspaceId === "string" && tab.workspaceId) {
                    return tab.workspaceId;
                }
                let tabId = getTabId(tab);
                if (!tabId) {
                    const flowHref = $("#" + FLOWS_UL_ID + " li.red-ui-tab.active a.red-ui-tab-label").first().attr("href") || "";
                    if (flowHref.charAt(0) === "#") {
                        tabId = flowHref.slice(1);
                    }
                }
                if (tabId && state.flowTabWorkspaceMap[tabId]) {
                    return state.flowTabWorkspaceMap[tabId];
                }
                return "";
            }

            function applyFlowReorder(newOrder) {
                if (state.applyingFlowReorder) {
                    return;
                }
                if (!Array.isArray(newOrder) || !newOrder.length) {
                    return;
                }

                const activeGroupKey = state.activeGroup;
                const activeGroup = activeGroupKey ? state.model.groupByName[activeGroupKey] : null;
                if (!activeGroup || !activeGroup.flows || activeGroup.flows.length < 2) {
                    return;
                }

                const oldGroupWorkspaceOrder = activeGroup.flows.map(function(flow) {
                    return flow.workspaceId;
                });
                const newGroupWorkspaceOrder = newOrder.map(function(tabId) {
                        return state.flowTabWorkspaceMap[tabId];
                    }).filter(function(workspaceId) {
                        return !!workspaceId;
                    });

                if (newGroupWorkspaceOrder.length !== oldGroupWorkspaceOrder.length) {
                    debug("flow reorder ignored: mapping mismatch", {
                        group: activeGroupKey,
                        oldOrder: oldGroupWorkspaceOrder,
                        newOrder: newOrder,
                        mapped: newGroupWorkspaceOrder
                    });
                    return;
                }

                if (arraysEqual(oldGroupWorkspaceOrder, newGroupWorkspaceOrder)) {
                    debug("flow reorder ignored: no effective change", {
                        group: activeGroupKey,
                        order: newGroupWorkspaceOrder
                    });
                    return;
                }

                const coreWorkspaceOrder = readCoreTabs().map(function(item) {
                    return item.workspaceId;
                });
                if (!coreWorkspaceOrder.length) {
                    debug("flow reorder ignored: no core workspace order available");
                    return;
                }

                const inGroup = {};
                oldGroupWorkspaceOrder.forEach(function(workspaceId) {
                    inGroup[workspaceId] = true;
                });

                const queue = newGroupWorkspaceOrder.slice();
                const updatedWorkspaceOrder = coreWorkspaceOrder.map(function(workspaceId) {
                    if (inGroup[workspaceId]) {
                        return queue.shift();
                    }
                    return workspaceId;
                });

                if (arraysEqual(coreWorkspaceOrder, updatedWorkspaceOrder)) {
                    debug("flow reorder ignored: computed global order unchanged", {
                        order: updatedWorkspaceOrder
                    });
                    return;
                }

                if (!RED.workspaces || typeof RED.workspaces.order !== "function") {
                    warn("Grouped tabs cannot reorder flows because RED.workspaces.order is unavailable.");
                    return;
                }

                state.applyingFlowReorder = true;
                debug("applying flow reorder via RED.workspaces.order", {
                    group: activeGroupKey,
                    oldGroupOrder: oldGroupWorkspaceOrder,
                    newGroupOrder: newGroupWorkspaceOrder,
                    globalOrder: updatedWorkspaceOrder
                });

                try {
                    RED.workspaces.order(updatedWorkspaceOrder);
                } finally {
                    setTimeout(function() {
                        state.applyingFlowReorder = false;
                        scheduleRebuild();
                    }, 0);
                }
            }

            function applyGroupReorder(newOrder) {
                if (state.applyingGroupReorder) {
                    return;
                }
                if (!Array.isArray(newOrder) || !newOrder.length) {
                    return;
                }

                if (!state.model.groups || state.model.groups.length < 2) {
                    return;
                }

                const oldGroupOrder = state.model.groups.map(function(group) {
                    return group.key;
                });
                const newGroupOrder = newOrder.map(function(tabId) {
                    return state.groupTabGroupMap[tabId];
                }).filter(function(groupKey) {
                    return !!groupKey;
                });

                if (newGroupOrder.length !== oldGroupOrder.length) {
                    debug("group reorder ignored: mapping mismatch", {
                        oldOrder: oldGroupOrder,
                        newOrder: newOrder,
                        mapped: newGroupOrder
                    });
                    return;
                }

                if (arraysEqual(oldGroupOrder, newGroupOrder)) {
                    debug("group reorder ignored: no effective change", {
                        order: newGroupOrder
                    });
                    return;
                }

                const groupFlowsByName = {};
                state.model.groups.forEach(function(group) {
                    groupFlowsByName[group.key] = group.flows.map(function(flow) {
                        return flow.workspaceId;
                    });
                });

                let reorderedWorkspaceOrder = [];
                newGroupOrder.forEach(function(groupKey) {
                    reorderedWorkspaceOrder = reorderedWorkspaceOrder.concat(groupFlowsByName[groupKey] || []);
                });

                const coreWorkspaceOrder = readCoreTabs().map(function(item) {
                    return item.workspaceId;
                });

                if (!coreWorkspaceOrder.length) {
                    debug("group reorder ignored: no core workspace order available");
                    return;
                }

                if (reorderedWorkspaceOrder.length !== coreWorkspaceOrder.length) {
                    debug("group reorder ignored: computed workspace size mismatch", {
                        coreOrder: coreWorkspaceOrder,
                        reordered: reorderedWorkspaceOrder
                    });
                    return;
                }

                if (arraysEqual(coreWorkspaceOrder, reorderedWorkspaceOrder)) {
                    debug("group reorder ignored: global order unchanged", {
                        order: reorderedWorkspaceOrder
                    });
                    return;
                }

                if (!RED.workspaces || typeof RED.workspaces.order !== "function") {
                    warn("Grouped tabs cannot reorder groups because RED.workspaces.order is unavailable.");
                    return;
                }

                const groupsByName = {};
                state.model.groups.forEach(function(group) {
                    groupsByName[group.key] = group;
                });
                state.model.groups = newGroupOrder.map(function(groupKey) {
                    return groupsByName[groupKey];
                }).filter(function(group) {
                    return !!group;
                });
                state.lastRenderedGroupSignature = getGroupSignature(state.model.groups);

                state.applyingGroupReorder = true;
                state.skipNextFlowsReorderRebuild = true;
                debug("applying group reorder via RED.workspaces.order", {
                    oldGroupOrder: oldGroupOrder,
                    newGroupOrder: newGroupOrder,
                    globalOrder: reorderedWorkspaceOrder
                });

                try {
                    RED.workspaces.order(reorderedWorkspaceOrder);
                } finally {
                    setTimeout(function() {
                        state.applyingGroupReorder = false;
                        state.skipNextFlowsReorderRebuild = false;
                    }, GROUP_REORDER_SETTLE_MS);
                }
            }

            function activateCoreWorkspace(workspaceId) {
                if (!workspaceId) {
                    return;
                }

                if (workspaceId === getActiveWorkspaceIdFromCore()) {
                    debug("activateCoreWorkspace skipped: already active", { workspaceId: workspaceId });
                    return;
                }

                state.lastKnownActiveWorkspaceId = workspaceId;
                debug("activateCoreWorkspace", { workspaceId: workspaceId });

                if (RED.workspaces && typeof RED.workspaces.show === "function") {
                    debug("activateCoreWorkspace using RED.workspaces.show", { workspaceId: workspaceId });
                    RED.workspaces.show(workspaceId);
                    return;
                }

                const coreLink = $("#" + ORIGINAL_UL_ID + " a.red-ui-tab-label").filter(function() {
                    return ($(this).attr("href") || "") === ("#" + workspaceId);
                }).first();

                if (!coreLink.length) {
                    debug("activateCoreWorkspace failed: core link not found", { workspaceId: workspaceId });
                    return;
                }

                debug("activateCoreWorkspace fallback synthetic click", { workspaceId: workspaceId });
                coreLink.trigger($.Event("mousedown", { which: 1 }));
                coreLink.trigger($.Event("mouseup", { which: 1 }));
            }

            function performOpenWorkspaceEditDialog(workspaceId) {
                if (!workspaceId) {
                    return;
                }

                let handled = false;
                let workspace = null;
                let subflow = null;

                if (RED.workspaces && typeof RED.workspaces.edit === "function") {
                    try {
                        debug("openWorkspaceEditDialog via RED.workspaces.edit", { workspaceId: workspaceId });
                        RED.workspaces.edit(workspaceId);
                        return;
                    } catch (err) {
                        debug("openWorkspaceEditDialog RED.workspaces.edit failed", {
                            workspaceId: workspaceId,
                            error: err && err.message ? err.message : err
                        });
                    }
                }

                workspace = getWorkspaceById(workspaceId);

                if (!workspace) {
                    if (RED.nodes && typeof RED.nodes.subflow === "function") {
                        subflow = RED.nodes.subflow(workspaceId);
                    }
                    if (subflow && RED.editor && typeof RED.editor.editSubflow === "function") {
                        debug("openWorkspaceEditDialog via RED.editor.editSubflow", { workspaceId: workspaceId });
                        RED.editor.editSubflow(subflow);
                        handled = true;
                    }
                } else if (!workspace.locked && RED.editor && typeof RED.editor.editFlow === "function") {
                    debug("openWorkspaceEditDialog via RED.editor.editFlow", { workspaceId: workspaceId });
                    RED.editor.editFlow(workspace);
                    handled = true;
                }

                if (handled) {
                    return;
                }

                const coreLink = $("#" + ORIGINAL_UL_ID + " a.red-ui-tab-label").filter(function() {
                    return ($(this).attr("href") || "") === ("#" + workspaceId);
                }).first();

                if (coreLink.length) {
                    debug("openWorkspaceEditDialog via core link dblclick fallback", { workspaceId: workspaceId });
                    coreLink.trigger($.Event("dblclick", { which: 1 }));
                    return;
                }

                debug("openWorkspaceEditDialog failed: no edit path available", {
                    workspaceId: workspaceId,
                    hasWorkspace: !!workspace,
                    hasSubflow: !!subflow,
                    hasWorkspacesEdit: !!(RED.workspaces && typeof RED.workspaces.edit === "function"),
                    hasEditorEditFlow: !!(RED.editor && typeof RED.editor.editFlow === "function"),
                    hasEditorEditSubflow: !!(RED.editor && typeof RED.editor.editSubflow === "function")
                });
            }

            function openWorkspaceEditDialog(workspaceId) {
                if (!workspaceId) {
                    return;
                }

                if (state.pendingEditOpenTimer) {
                    clearTimeout(state.pendingEditOpenTimer);
                    state.pendingEditOpenTimer = null;
                }

                // Defer edit opening slightly so tab activation/click handlers finish first.
                state.pendingEditOpenTimer = setTimeout(function() {
                    state.pendingEditOpenTimer = null;
                    performOpenWorkspaceEditDialog(workspaceId);
                }, EDIT_DIALOG_DEFER_MS);
            }

            function markFlowTabWorkspaces() {
                const flowsUl = $("#" + FLOWS_UL_ID);
                if (!flowsUl.length) {
                    return;
                }

                flowsUl.children("li.red-ui-tab").each(function(index, el) {
                    const li = $(el);
                    const href = li.children("a.red-ui-tab-label").attr("href") || "";
                    if (href.charAt(0) !== "#") {
                        li.removeAttr("data-workspace-id");
                        return;
                    }
                    const tabId = href.slice(1);
                    const workspaceId = state.flowTabWorkspaceMap[tabId];
                    if (workspaceId) {
                        li.attr("data-workspace-id", workspaceId);
                    } else {
                        li.removeAttr("data-workspace-id");
                    }
                });
            }

            // Injects an explicit close button on every subflow tab.
            // Bypasses RED.tabs internals; reliable across all NR versions.
            function injectCloseButtons() {
                // flows row
                $("#" + FLOWS_UL_ID + " li.red-ui-tab").each(function() {
                    const li = $(this);
                    if (li.find(".nr-grouped-flows-close-btn").length) { return; }
                    const workspaceId = li.attr("data-workspace-id");
                    if (!workspaceId) { return; }
                    if (!(RED.nodes && typeof RED.nodes.subflow === "function" && RED.nodes.subflow(workspaceId))) { return; }
                    const btn = $("<span>", { "class": "nr-grouped-flows-close-btn", title: "Close subflow" });
                    btn.on("click", function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        if (RED.workspaces && typeof RED.workspaces.remove === "function") {
                            RED.workspaces.remove({ id: workspaceId });
                        }
                    });
                    li.append(btn);
                });

                // groups row (standalone subflow tabs)
                $("#" + GROUPS_UL_ID + " li.red-ui-tab").each(function() {
                    const li = $(this);
                    if (li.find(".nr-grouped-flows-close-btn").length) { return; }
                    const href = li.children("a.red-ui-tab-label").attr("href") || "";
                    if (href.charAt(0) !== "#") { return; }
                    const groupKey = state.groupTabGroupMap[href.slice(1)];
                    if (!groupKey) { return; }
                    const group = state.model.groupByName[groupKey];
                    if (!group || !group.standalone) { return; }
                    const workspaceId = group.standaloneWorkspaceId;
                    if (!workspaceId) { return; }
                    if (!(RED.nodes && typeof RED.nodes.subflow === "function" && RED.nodes.subflow(workspaceId))) { return; }
                    const btn = $("<span>", { "class": "nr-grouped-flows-close-btn", title: "Close subflow" });
                    btn.on("click", function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        if (RED.workspaces && typeof RED.workspaces.remove === "function") {
                            RED.workspaces.remove({ id: workspaceId });
                        }
                    });
                    li.append(btn);
                });
            }

            function resetFlowTabsState() {
                state.suspendFlowChange = true;
                clearTabs(state.flowTabs, FLOWS_UL_ID);
                state.suspendFlowChange = false;
                state.flowTabWorkspaceMap = {};
                state.lastRenderedFlowGroup = null;
                state.lastRenderedFlowSignature = "";
                state.lastRenderedActiveFlowTab = null;
            }

            // T020 (patch): measure the tab stack's REAL rendered height
            // instead of trusting a fixed pixel guess. A guess that's even
            // a few px short leaves a visible sliver where the canvas (and
            // its scrollbar) peeks up into the header; a guess that's too
            // tall leaves a dead gap. Row height can also legitimately
            // differ a little by theme/font/zoom. Only meaningful in NR5
            // header mode - on NR4 the tab bar's height doesn't drive any
            // outer layout box, so there's nothing to sync.
            function syncHeaderHeight(dualRowVisible) {
                if (!state.headerTabsMode || !state.container || !state.container.length) {
                    return;
                }
                const measured = state.container.outerHeight();
                if (!measured) {
                    return;
                }
                const varName = dualRowVisible
                    ? "--nr-grouped-flows-header-height-dual"
                    : "--nr-grouped-flows-header-height-single";
                $("#" + EDITOR_ROOT_ID).css(varName, measured + "px");
            }

            function setFlowRowVisible(visible) {
                const flowWrapper = $("#" + FLOWS_UL_ID).closest(".red-ui-tabs");
                if (flowWrapper.length) {
                    if (visible) {
                        flowWrapper.show();
                    } else {
                        flowWrapper.hide();
                    }
                }
                getWorkspaceStateTargets().toggleClass(WORKSPACE_SINGLE_ROW_CLASS, !visible);
                // Read the layout back AFTER show/hide + class toggle have
                // been applied, so outerHeight() reflects reality, not the
                // previous frame's shape.
                syncHeaderHeight(visible);
            }

            function findVisibleDialogForm() {
                let form = $("#dialog-form");
                if (form.length && form.is(":visible")) {
                    return form.first();
                }
                form = $(".ui-dialog-content:visible form").first();
                if (form.length) {
                    return form;
                }
                return $();
            }

            function persistDialogGroupValue(workspaceId) {
                const workspace = getWorkspaceById(workspaceId);
                const input = $("#" + DIALOG_GROUP_INPUT_ID);
                if (!workspace || !input.length) {
                    return;
                }

                const oldValue = normalizeGroupName(
                    workspace[WORKSPACE_GROUP_PROPERTY] ||
                    (state.persistedGroups && state.persistedGroups[workspaceId]) || ""
                );
                const newValue = normalizeGroupName(input.val());
                if (newValue === oldValue) {
                    return;
                }

                if (newValue) {
                    workspace[WORKSPACE_GROUP_PROPERTY] = newValue;
                } else {
                    delete workspace[WORKSPACE_GROUP_PROPERTY];
                }
                if (!state.persistedGroups) { state.persistedGroups = {}; }
                if (newValue) {
                    state.persistedGroups[workspaceId] = newValue;
                } else {
                    delete state.persistedGroups[workspaceId];
                }
                if (RED.nodes && typeof RED.nodes.dirty === "function") {
                    RED.nodes.dirty(true);
                }
                scheduleRebuild();
                debug("workspace group updated", {
                    workspaceId: workspaceId,
                    oldGroup: oldValue,
                    newGroup: newValue
                });
            }

            function bindDialogGroupSave(workspaceId, form) {
                if (!workspaceId || !form || !form.length) {
                    return;
                }

                const tray = form.closest(".red-ui-tray");
                let saveButtons = $("#node-dialog-ok, #node-dialog-ok-save");
                if (tray.length) {
                    saveButtons = saveButtons.add(tray.find("button.red-ui-button.primary"));
                }
                saveButtons.off(DIALOG_GROUP_SAVE_NS).on("click" + DIALOG_GROUP_SAVE_NS, function() {
                    setTimeout(function() {
                        persistDialogGroupValue(workspaceId);
                    }, 0);
                });
                form.off("submit" + DIALOG_GROUP_SAVE_NS).on("submit" + DIALOG_GROUP_SAVE_NS, function() {
                    setTimeout(function() {
                        persistDialogGroupValue(workspaceId);
                    }, 0);
                });
            }

            function ensureDialogGroupField(workspaceId) {
                const workspace = getWorkspaceById(workspaceId);
                if (!workspace) {
                    return false;
                }

                const form = findVisibleDialogForm();
                if (!form.length) {
                    return false;
                }

                let row = form.find("." + DIALOG_GROUP_ROW_CLASS).first();
                if (!row.length) {
                    row = $('<div class="form-row ' + DIALOG_GROUP_ROW_CLASS + '"></div>');
                    row.append('<label for="' + DIALOG_GROUP_INPUT_ID + '"><i class="fa fa-folder-open"></i> ' + t("Group", "Group") + "</label>");
                    row.append('<input type="text" id="' + DIALOG_GROUP_INPUT_ID + '" placeholder="' + t("Optional group", "Optional group") + '">');

                    const infoRow = form.find("#node-input-info").closest(".form-row");
                    if (infoRow.length) {
                        infoRow.before(row);
                    } else {
                        const labelRow = form.find("#node-input-label").closest(".form-row");
                        if (labelRow.length) {
                            labelRow.after(row);
                        } else {
                            form.append(row);
                        }
                    }
                }

                row.find("#" + DIALOG_GROUP_INPUT_ID).val(
                    normalizeGroupName(
                        workspace[WORKSPACE_GROUP_PROPERTY] ||
                        (state.persistedGroups && state.persistedGroups[workspaceId]) || ""
                    )
                );
                bindDialogGroupSave(workspaceId, form);
                return true;
            }

            function scheduleEnsureDialogGroupField(workspaceId) {
                if (!workspaceId) {
                    return;
                }

                if (state.dialogFieldRetryTimer) {
                    clearTimeout(state.dialogFieldRetryTimer);
                    state.dialogFieldRetryTimer = null;
                }

                let attempts = 0;
                function attempt() {
                    state.dialogFieldRetryTimer = null;
                    if (!state.container) { return; }
                    if (ensureDialogGroupField(workspaceId)) {
                        return;
                    }
                    attempts += 1;
                    if (attempts < 20) {
                        state.dialogFieldRetryTimer = setTimeout(attempt, 25);
                    }
                }
                state.dialogFieldRetryTimer = setTimeout(attempt, 0);
            }

            function patchEditFlowDialog() {
                if (state.wrappedEditFlow || !RED.editor || typeof RED.editor.editFlow !== "function") {
                    return;
                }

                state.originalEditFlow = RED.editor.editFlow;
                state.wrappedEditFlow = function(workspace) {
                    const result = state.originalEditFlow.apply(this, arguments);
                    const workspaceId = workspace && typeof workspace === "object" ? workspace.id : workspace;
                    if (workspaceId) {
                        scheduleEnsureDialogGroupField(workspaceId);
                    }
                    return result;
                };
                RED.editor.editFlow = state.wrappedEditFlow;
            }

            function unpatchEditFlowDialog() {
                if (!state.wrappedEditFlow || !state.originalEditFlow || !RED.editor) {
                    return;
                }
                if (RED.editor.editFlow === state.wrappedEditFlow) {
                    RED.editor.editFlow = state.originalEditFlow;
                }
                state.wrappedEditFlow = null;
                state.originalEditFlow = null;
                $("#node-dialog-ok, #node-dialog-ok-save, .red-ui-tray-footer button.red-ui-button.primary").off(DIALOG_GROUP_SAVE_NS);
                $("#dialog-form").off(DIALOG_GROUP_SAVE_NS);
            }

            function patchDeployXHR() {
                if (state.originalXHROpen) { return; }
                if (!window.XMLHttpRequest) { return; }
                const originalOpen = XMLHttpRequest.prototype.open;
                const originalSend = XMLHttpRequest.prototype.send;
                state.originalXHROpen = originalOpen;
                state.originalXHRSend = originalSend;
                XMLHttpRequest.prototype.open = function(method, url) {
                    const path = String(url || "").split("?")[0];
                    this._nrGroupedFlowsDeploy = (
                        String(method || "").toUpperCase() === "POST" &&
                        (path === "flows" || path.endsWith("/flows"))
                    );
                    return originalOpen.apply(this, arguments);
                };
                XMLHttpRequest.prototype.send = function(body) {
                    if (this._nrGroupedFlowsDeploy && body && typeof body === "string") {
                        try {
                            const parsed = JSON.parse(body);
                            if (parsed && Array.isArray(parsed.flows)) {
                                parsed.flows.forEach(function(node) {
                                    if (node.type !== "tab") { return; }
                                    const group = state.persistedGroups && state.persistedGroups[node.id];
                                    if (group) {
                                        node[WORKSPACE_GROUP_PROPERTY] = group;
                                    } else {
                                        delete node[WORKSPACE_GROUP_PROPERTY];
                                    }
                                });
                                return originalSend.call(this, JSON.stringify(parsed));
                            }
                        } catch (err) {
                            // Fall through to unmodified send on parse error.
                        }
                    }
                    return originalSend.apply(this, arguments);
                };
            }

            function unpatchDeployXHR() {
                if (!state.originalXHROpen || !state.originalXHRSend) { return; }
                XMLHttpRequest.prototype.open = state.originalXHROpen;
                XMLHttpRequest.prototype.send = state.originalXHRSend;
                state.originalXHROpen = null;
                state.originalXHRSend = null;
            }

            function bindTabDomEvents() {
                const groupsUl = $("#" + GROUPS_UL_ID);
                const flowsUl = $("#" + FLOWS_UL_ID);

                groupsUl.off(".nrGroupedTabs");
                flowsUl.off(".nrGroupedTabs");

                groupsUl.on("mousedown.nrGroupedTabs", "li.red-ui-tab", function() {
                    state.lastFlowPointerWorkspaceId = null;
                    state.lastFlowPointerTime = 0;
                    state.pendingFlowDoubleWorkspaceId = null;
                    debug("group mousedown cleared pending double-click state");
                });

                flowsUl.on("mousedown.nrGroupedTabs", "li.red-ui-tab", function() {
                    const li = $(this);
                    let tabId = li.data("tabId");
                    if (!tabId) {
                        const href = li.children("a.red-ui-tab-label").attr("href") || "";
                        if (href.charAt(0) === "#") {
                            tabId = href.slice(1);
                        }
                    }

                    const workspaceId = li.attr("data-workspace-id") || state.flowTabWorkspaceMap[tabId];
                    if (!workspaceId) {
                        debug("flow mousedown without workspace mapping", { tabId: tabId });
                        return;
                    }

                    const now = Date.now();
                    if (
                        state.lastFlowPointerWorkspaceId === workspaceId &&
                        (now - state.lastFlowPointerTime) < FLOW_DOUBLE_CLICK_WINDOW_MS
                    ) {
                        state.pendingFlowDoubleWorkspaceId = workspaceId;
                        debug("flow mousedown potential double-click armed", { workspaceId: workspaceId });
                    } else {
                        state.pendingFlowDoubleWorkspaceId = null;
                        debug("flow mousedown single click", { workspaceId: workspaceId });
                    }

                    state.lastFlowPointerWorkspaceId = workspaceId;
                    state.lastFlowPointerTime = now;
                });
            }

            function unbindTabDomEvents() {
                $("#" + GROUPS_UL_ID).off(".nrGroupedTabs");
                $("#" + FLOWS_UL_ID).off(".nrGroupedTabs");
            }

            function renderGroupTabs() {
                if (!state.groupTabs) {
                    return;
                }

                const currentSignature = getGroupSignature(state.model.groups);
                const groupsChanged = currentSignature !== state.lastRenderedGroupSignature;

                if (groupsChanged) {
                    state.suspendGroupChange = true;
                    clearTabs(state.groupTabs, GROUPS_UL_ID);
                    state.groupTabGroupMap = {};

                    state.model.groups.forEach(function(group) {
                        state.groupTabs.addTab({
                            id: group.tabId,
                            label: htmlEscape(group.name),
                            name: htmlEscape(group.name),
                            groupKey: group.key
                        });
                        state.groupTabGroupMap[group.tabId] = group.key;
                    });

                    state.lastRenderedGroupSignature = currentSignature;
                    state.lastRenderedActiveGroup = null;
                    state.suspendGroupChange = false;
                }

                if (
                    state.activeGroup &&
                    state.model.groupByName[state.activeGroup] &&
                    state.lastRenderedActiveGroup !== state.activeGroup
                ) {
                    state.suspendGroupChange = true;
                    state.groupTabs.activateTab(state.model.groupByName[state.activeGroup].tabId);
                    state.suspendGroupChange = false;
                    state.lastRenderedActiveGroup = state.activeGroup;
                }
            }

            function renderFlowTabs(groupKey, activateFirstIfNeeded) {
                if (!state.flowTabs) {
                    return;
                }

                const selectedGroup = state.model.groupByName[groupKey];
                if (!selectedGroup) {
                    setFlowRowVisible(false);
                    resetFlowTabsState();
                    return;
                }

                if (selectedGroup.standalone) {
                    setFlowRowVisible(false);
                    resetFlowTabsState();

                    const standaloneFlow = selectedGroup.flows[0];
                    if (!standaloneFlow) {
                        return;
                    }

                    const activeStandaloneWorkspaceId = state.model.activeWorkspaceId || getActiveWorkspaceIdFromCore();
                    if (
                        activateFirstIfNeeded &&
                        standaloneFlow.workspaceId &&
                        standaloneFlow.workspaceId !== activeStandaloneWorkspaceId
                    ) {
                        setTimeout(function() {
                            activateCoreWorkspace(standaloneFlow.workspaceId);
                        }, 0);
                    }
                    state.lastWorkspaceByGroup[groupKey] = standaloneFlow.workspaceId;
                    return;
                }

                setFlowRowVisible(true);

                const currentFlowSignature = getFlowSignature(selectedGroup.flows);
                const flowsChanged = (
                    state.lastRenderedFlowGroup !== groupKey ||
                    state.lastRenderedFlowSignature !== currentFlowSignature
                );

                if (flowsChanged) {
                    state.suspendFlowChange = true;
                    clearTabs(state.flowTabs, FLOWS_UL_ID);
                    state.flowTabWorkspaceMap = {};

                    selectedGroup.flows.forEach(function(flow) {
                        state.flowTabs.addTab({
                            id: flow.flowTabId,
                            label: htmlEscape(flow.label),
                            name: htmlEscape(flow.fullLabel),
                            fullLabel: htmlEscape(flow.fullLabel),
                            workspaceId: flow.workspaceId,
                            disabled: flow.disabled,
                            locked: flow.locked,
                            changed: flow.changed
                        });
                        state.flowTabWorkspaceMap[flow.flowTabId] = flow.workspaceId;
                    });
                    markFlowTabWorkspaces();

                    state.lastRenderedFlowGroup = groupKey;
                    state.lastRenderedFlowSignature = currentFlowSignature;
                    state.lastRenderedActiveFlowTab = null;
                    state.suspendFlowChange = false;
                }

                const activeWorkspaceId = state.model.activeWorkspaceId || getActiveWorkspaceIdFromCore();
                let selectedFlow = null;
                let activeFlowInGroup = null;
                const rememberedWorkspaceId = state.lastWorkspaceByGroup[groupKey];

                if (activeWorkspaceId) {
                    activeFlowInGroup = selectedGroup.flows.find(function(flow) {
                        return flow.workspaceId === activeWorkspaceId;
                    }) || null;
                }

                if (activeFlowInGroup) {
                    selectedFlow = activeFlowInGroup;
                } else if (rememberedWorkspaceId) {
                    selectedFlow = selectedGroup.flows.find(function(flow) {
                        return flow.workspaceId === rememberedWorkspaceId;
                    }) || null;
                }

                if (!selectedFlow && selectedGroup.flows.length) {
                    selectedFlow = selectedGroup.flows[0];
                }

                if (
                    activateFirstIfNeeded &&
                    selectedFlow &&
                    selectedFlow.workspaceId !== activeWorkspaceId
                ) {
                    setTimeout(function() {
                        activateCoreWorkspace(selectedFlow.workspaceId);
                    }, 0);
                }

                if (selectedFlow) {
                    if (state.lastRenderedActiveFlowTab !== selectedFlow.flowTabId) {
                        state.suspendFlowChange = true;
                        state.flowTabs.activateTab(selectedFlow.flowTabId);
                        state.suspendFlowChange = false;
                        state.lastRenderedActiveFlowTab = selectedFlow.flowTabId;
                    }
                    state.lastWorkspaceByGroup[groupKey] = selectedFlow.workspaceId;
                } else {
                    state.lastRenderedActiveFlowTab = null;
                }
            }

            function onGroupChange(groupKey) {
                state.activeGroup = groupKey;
                state.lastRenderedActiveGroup = groupKey;

                // Group click shows and activates the group's currently remembered flow (or first flow).
                renderFlowTabs(groupKey, true);
            }

            function rebuild() {
                if (!mount()) {
                    // DOM not initialised yet — should not normally happen since setupDOM()
                    // is called before the first rebuild, but guard defensively.
                    return;
                }

                state.model = buildModel();
                state.lastKnownActiveWorkspaceId = state.model.activeWorkspaceId || state.lastKnownActiveWorkspaceId;
                rememberWorkspaceForGroup(state.model.activeWorkspaceId);
                pruneGroupWorkspaceMemory();

                if (state.model.activeWorkspaceId) {
                    const groupFromActive = state.model.workspaceToGroup[state.model.activeWorkspaceId];
                    if (groupFromActive) {
                        state.activeGroup = groupFromActive;
                    }
                }

                if (!state.activeGroup || !state.model.groupByName[state.activeGroup]) {
                    state.activeGroup = state.model.groups.length ? state.model.groups[0].key : null;
                }

                renderGroupTabs();
                renderFlowTabs(state.activeGroup, false);
                injectCloseButtons();
            }

            function scheduleRebuild() {
                if (state.rebuildTimer) {
                    clearTimeout(state.rebuildTimer);
                }
                state.rebuildTimer = setTimeout(rebuild, 0);
            }

            function bindEvents() {
                if (!RED.events || state.eventBindings.length) {
                    return;
                }

                [
                    "flows:add",
                    "flows:remove",
                    "flows:change",
                    "flows:reorder",
                    "workspace:change",
                    "workspace:show",
                    "workspace:hide"
                ].forEach(function(name) {
                    const handler = function(activeWorkspaceId) {
                        if (name === "flows:reorder" && state.skipNextFlowsReorderRebuild) {
                            state.skipNextFlowsReorderRebuild = false;
                            debug("flows:reorder rebuild skipped (internal group reorder)");
                            return;
                        }

                        if (name === "workspace:change") {
                            if (typeof activeWorkspaceId === "string" && activeWorkspaceId) {
                                state.lastKnownActiveWorkspaceId = activeWorkspaceId;
                                rememberWorkspaceForGroup(activeWorkspaceId);
                            } else if (
                                activeWorkspaceId &&
                                typeof activeWorkspaceId === "object" &&
                                typeof activeWorkspaceId.id === "string" &&
                                activeWorkspaceId.id
                            ) {
                                state.lastKnownActiveWorkspaceId = activeWorkspaceId.id;
                                rememberWorkspaceForGroup(activeWorkspaceId.id);
                            }
                        }
                        scheduleRebuild();
                    };
                    RED.events.on(name, handler);
                    state.eventBindings.push({ name: name, handler: handler });
                });

                ["flows:full", "flows:partial"].forEach(function(deployEvent) {
                    const handler = function() { scheduleRebuild(); };
                    RED.events.on(deployEvent, handler);
                    state.eventBindings.push({ name: deployEvent, handler: handler });
                });
            }

            function unbindEvents() {
                if (!RED.events || !state.eventBindings.length) {
                    return;
                }

                const off = RED.events.off || RED.events.removeListener;
                if (typeof off === "function") {
                    state.eventBindings.forEach(function(binding) {
                        off.call(RED.events, binding.name, binding.handler);
                    });
                }

                state.eventBindings = [];
            }

            // T019: One-time DOM and tab setup. Called once from waitForCoreTabs().
            // Returns true on success, false if prerequisites are not yet available.
            function setupDOM() {
                if (!RED.tabs || typeof RED.tabs.create !== "function") {
                    return false;
                }

                const originalUl = $("#" + ORIGINAL_UL_ID);
                if (!originalUl.length) {
                    return false;
                }

                const originalWrapper = originalUl.closest(".red-ui-tabs");
                if (!originalWrapper.length) {
                    return false;
                }

                state.originalWrapper = originalWrapper;
                // T020 (patch): detect NR5 vs NR4 layout once, at mount time.
                state.headerTabsMode = !!originalWrapper.closest("#" + HEADER_TABS_ID).length;
                $("#" + WORKSPACE_ROOT_ID).toggleClass(HEADER_MODE_CLASS, state.headerTabsMode);
                debug("layout mode detected", { headerTabsMode: state.headerTabsMode });


                state.container = $('<div id="' + CONTAINER_ID + '" class="nr-grouped-flows"></div>');
                state.container.append('<ul id="' + GROUPS_UL_ID + '"></ul>');
                state.container.append('<ul id="' + FLOWS_UL_ID + '"></ul>');

                originalWrapper.after(state.container);

                state.groupTabs = RED.tabs.create({
                    id: GROUPS_UL_ID,
                    scrollable: true,
                    sortable: true,
                    addButton: addFlowEnabled() ? "core:add-flow" : undefined,
                    addButtonCaption: t("workspace.addFlow", "Add flow"),
                    menu: buildFlowMenu,
                    onreorder: function(oldOrder, newOrder) {
                        debug("group onreorder", {
                            oldOrder: oldOrder,
                            newOrder: newOrder
                        });
                        applyGroupReorder(newOrder);
                    },
                    onchange: function(tab) {
                        if (state.suspendGroupChange) {
                            return;
                        }
                        const groupKey = getGroupKeyForTab(tab);
                        if (!groupKey) {
                            debug("group onchange ignored: missing group key", { tab: tab });
                            return;
                        }
                        onGroupChange(groupKey);
                    },
                    ondblclick: function(tab) {
                        const groupKey = getGroupKeyForTab(tab);
                        if (!groupKey) {
                            return;
                        }
                        const entry = state.model.groupByName[groupKey];
                        if (!entry || !entry.standalone || !entry.standaloneWorkspaceId) {
                            return;
                        }
                        openWorkspaceEditDialog(entry.standaloneWorkspaceId);
                    }
                });

                state.flowTabs = RED.tabs.create({
                    id: FLOWS_UL_ID,
                    scrollable: true,
                    sortable: true,
                    onreorder: function(oldOrder, newOrder) {
                        debug("flow onreorder", {
                            oldOrder: oldOrder,
                            newOrder: newOrder
                        });
                        applyFlowReorder(newOrder);
                    },
                    onchange: function(tab) {
                        const workspaceId = getWorkspaceIdForFlowTab(tab);
                        if (state.suspendFlowChange || !workspaceId) {
                            return;
                        }
                        activateCoreWorkspace(workspaceId);
                    },
                    ondblclick: function(tab) {
                        const workspaceId = getWorkspaceIdForFlowTab(tab);
                        if (!workspaceId) {
                            debug("flow ondblclick ignored: missing tab/workspace");
                            return;
                        }
                        debug("flow ondblclick received", {
                            workspaceId: workspaceId,
                            pending: state.pendingFlowDoubleWorkspaceId
                        });
                        if (state.pendingFlowDoubleWorkspaceId !== workspaceId) {
                            debug("flow ondblclick blocked by guard", {
                                workspaceId: workspaceId,
                                pending: state.pendingFlowDoubleWorkspaceId
                            });
                            return;
                        }
                        state.pendingFlowDoubleWorkspaceId = null;
                        debug("flow ondblclick accepted", { workspaceId: workspaceId });
                        openWorkspaceEditDialog(workspaceId);
                    }
                });

                // T020 (patch): mark the FLOWS row's own wrapper so CSS can
                // shrink-wrap it to its actual tabs, instead of it stretching
                // (native NR5 behaviour, fine for the GROUPS row which is
                // meant to look like a full-width bar) to the same width as
                // the groups row above it. When a group has only 1-2 flows,
                // that stretched, opaquely-backgrounded wrapper was bleeding
                // out over empty space to the right of the last flow tab -
                // and since the whole thing is position:absolute, that empty
                // painted rectangle was landing right on top of the canvas.
                $("#" + FLOWS_UL_ID).closest(".red-ui-tabs").addClass("nr-grouped-flows-row-flows");

                bindTabDomEvents();
                patchEditFlowDialog();
                state.originalWrapper.hide();
                state.container.show();
                getWorkspaceStateTargets().addClass(WORKSPACE_ENABLED_CLASS);
                return true;
            }

            // T019: mount() is now a guard-only check. DOM creation is in setupDOM().
            function mount() {
                return !!(state.container && state.container.length);
            }

            function waitForCoreTabs() {
                if (state.retryTimer) {
                    clearTimeout(state.retryTimer);
                }

                if (setupDOM()) {
                    state.retryCount = 0;
                    patchDeployXHR();
                    bindEvents();
                    rebuild();
                    return;
                }

                state.retryCount += 1;
                if (!state.didWarnUnavailable && state.retryCount >= WARN_CORE_TABS_RETRY_AT) {
                    state.didWarnUnavailable = true;
                    warn("Grouped tabs plugin loaded, but core workspace tabs were not found.");
                }

                state.retryTimer = setTimeout(waitForCoreTabs, BOOT_RETRY_INTERVAL_MS);
            }

            function start() {
                waitForCoreTabs();
            }

            function stop() {
                if (state.retryTimer) {
                    clearTimeout(state.retryTimer);
                    state.retryTimer = null;
                }

                if (state.rebuildTimer) {
                    clearTimeout(state.rebuildTimer);
                    state.rebuildTimer = null;
                }
                if (state.pendingEditOpenTimer) {
                    clearTimeout(state.pendingEditOpenTimer);
                    state.pendingEditOpenTimer = null;
                }
                if (state.dialogFieldRetryTimer) {
                    clearTimeout(state.dialogFieldRetryTimer);
                    state.dialogFieldRetryTimer = null;
                }

                unbindEvents();
                unbindTabDomEvents();
                unpatchEditFlowDialog();
                unpatchDeployXHR();

                if (state.container && state.container.length) {
                    state.container.remove();
                }

                if (state.originalWrapper && state.originalWrapper.length) {
                    state.originalWrapper.show();
                }
                getWorkspaceStateTargets().removeClass(WORKSPACE_ENABLED_CLASS);
                getWorkspaceStateTargets().removeClass(WORKSPACE_SINGLE_ROW_CLASS);
                $("#" + WORKSPACE_ROOT_ID).removeClass(HEADER_MODE_CLASS);
                if (state.headerTabsMode) {
                    $("#" + EDITOR_ROOT_ID).css("--nr-grouped-flows-header-height-dual", "");
                    $("#" + EDITOR_ROOT_ID).css("--nr-grouped-flows-header-height-single", "");
                }

                // T017: reset all state fields via factory instead of manual enumeration.
                Object.assign(state, createInitialState());
            }

            return {
                start: start,
                stop: stop
            };
        }

        let controller;

        function startController() {
            if (controller) {
                return;
            }
            try {
                controller = createController();
                controller.start();
            } catch (err) {
                controller = null;
                if (window.console && typeof console.error === "function") {
                    console.error("[nr-grouped-flows] failed to start", err);
                }
                if (window.RED && RED.notify && typeof RED.notify === "function") {
                    RED.notify("Grouped tabs plugin failed to start. Check browser console.", "error");
                }
            }
        }

        function stopController() {
            if (!controller) {
                return;
            }
            controller.stop();
            controller = null;
        }

        function registerPlugin() {
            if (pluginRegistered) {
                return;
            }
            if (!window.RED || !RED.plugins || typeof RED.plugins.registerPlugin !== "function") {
                return;
            }

            RED.plugins.registerPlugin(PLUGIN_ID, {
                onadd: function() {
                    startController();
                },
                onremove: function() {
                    stopController();
                }
            });
            pluginRegistered = true;

            // Fallback startup path for environments where onadd does not fire synchronously
            // (some Node-RED versions defer plugin callbacks). startController() is idempotent
            // via its `if (controller) return` guard, so calling it here is safe even if onadd
            // already fired.
            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", startController);
            } else {
                startController();
            }
        }

        function boot() {
            let tries = 0;

            function attemptRegister() {
                registerPlugin();
                if (pluginRegistered) {
                    if (window.console && typeof console.info === "function") {
                        console.info("[nr-grouped-flows] registered v" + PLUGIN_VERSION);
                        if (isDebugEnabled()) {
                            console.info("[nr-grouped-flows] debug mode active");
                        }
                    }
                    return;
                }
                tries += 1;
                if (tries >= BOOT_MAX_RETRIES) {
                    if (window.console && typeof console.warn === "function") {
                        console.warn("[nr-grouped-flows] failed to register plugin API");
                    }
                    return;
                }
                setTimeout(attemptRegister, BOOT_RETRY_INTERVAL_MS);
            }

            attemptRegister();
        }

        if (typeof window !== "undefined") {
            window.nrGroupedTabsDebug = function(enabled) {
                setDebugEnabled(!!enabled);
                if (window.console && typeof console.info === "function") {
                    console.info("[nr-grouped-flows] debug " + (enabled ? "enabled" : "disabled") + "; reload the page");
                }
            };
        }

        boot();
    })();
    </script>

    <style>
    #nr-grouped-flows {
        display: none;
    }

    /* NR5 only. #red-ui-header-tabs is position:static by default, so
       #nr-grouped-flows's "position:absolute; left:0; right:0" below was
       skipping right past it and anchoring to #red-ui-header instead - the
       FULL header width, including the logo (left) and the Deploy button /
       hamburger menu (#red-ui-header-toolbar, right), which live as
       SIBLINGS of #red-ui-header-tabs, not inside it. Our two tab rows
       have opaque backgrounds (core NR5 style: #red-ui-header-tabs
       .red-ui-tabs { background: var(--red-ui-header-background) }) and
       z-index:3, so they were painting straight over the Deploy button -
       not removing it, just visually burying it. Giving #red-ui-header-tabs
       its own containing block fixes the anchor to just its own natural
       width (the flexible middle strip between logo and toolbar), which is
       exactly where the native single-row tab bar lives too.
